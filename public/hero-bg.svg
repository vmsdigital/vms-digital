<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <radialGradient id="g1" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#C8F135" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#C8F135" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#09090B" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <circle cx="30" cy="30" r="0.8" fill="rgba(200,241,53,0.12)"/>
    </pattern>
    <pattern id="grid2" width="120" height="120" patternUnits="userSpaceOnUse">
      <rect width="120" height="120" fill="url(#grid)"/>
      <line x1="0" y1="60" x2="120" y2="60" stroke="rgba(200,241,53,0.03)" stroke-width="0.5"/>
      <line x1="60" y1="0" x2="60" y2="120" stroke="rgba(200,241,53,0.03)" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="#09090B"/>
  <rect width="1920" height="1080" fill="url(#g1)"/>
  <rect width="1920" height="1080" fill="url(#grid2)"/>
  <ellipse cx="960" cy="400" rx="500" ry="300" fill="rgba(200,241,53,0.03)" filter="blur(80px)"/>
  <ellipse cx="600" cy="600" rx="300" ry="200" fill="rgba(200,241,53,0.02)" filter="blur(60px)"/>
